```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eco Vitality - PoC</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4fff4;
    margin:0;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#2e7d32;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:25px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#4caf50;
    color:white;
    padding:12px;
}

td{
    border:1px solid #ddd;
    padding:10px;
}

input,select{
    width:100%;
    padding:8px;
    box-sizing:border-box;
}

button{
    padding:12px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
}

.add-btn{
    background:#2196f3;
    color:white;
    margin-top:15px;
}

.report-btn{
    background:#4caf50;
    color:white;
    margin-top:15px;
    margin-left:10px;
}

.results{
    margin-top:25px;
}

.card{
    background:#e8f5e9;
    padding:15px;
    margin-bottom:12px;
    border-radius:10px;
    border-left:6px solid #4caf50;
}

.big{
    font-size:24px;
    font-weight:bold;
    color:#2e7d32;
}

.footer{
    margin-top:20px;
    background:#f5f5f5;
    padding:15px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🌱 Eco Vitality</h1>

<p class="subtitle">
Proof of Concept - Sustainable Transportation Impact Tracker
</p>

<table id="activityTable">
<tr>
<th>Transport Mode</th>
<th>Distance (km)</th>
</tr>

<tr>
<td>
<select>
<option value="0.192">Car</option>
<option value="0.105">Bus</option>
<option value="0.041">Train</option>
<option value="0">Bike</option>
<option value="0">Walk</option>
</select>
</td>

<td>
<input type="number" value="10">
</td>
</tr>

</table>

<button class="add-btn" onclick="addRow()">
+ Add Activity
</button>

<button class="report-btn" onclick="generateReport()">
Generate Sustainability Report
</button>

<div id="results" class="results"></div>

</div>

<script>

const transportNames = {
    "0.192":"Car",
    "0.105":"Bus",
    "0.041":"Train",
    "0":"Bike/Walk"
};

function addRow(){

    const table = document.getElementById("activityTable");

    const row = table.insertRow();

    row.innerHTML = `
    <td>
        <select>
            <option value="0.192">Car</option>
            <option value="0.105">Bus</option>
            <option value="0.041">Train</option>
            <option value="0">Bike</option>
            <option value="0">Walk</option>
        </select>
    </td>

    <td>
        <input type="number" value="5">
    </td>
    `;
}

function generateReport(){

    const table = document.getElementById("activityTable");

    let totalEmission = 0;
    let totalDistance = 0;
    let totalCarEquivalent = 0;
    let transportUsage = {};

    for(let i=1;i<table.rows.length;i++){

        const row = table.rows[i];

        const select = row.cells[0].querySelector("select");

        const factor = parseFloat(select.value);

        const transport =
            select.options[select.selectedIndex].text;

        const distance =
            parseFloat(
                row.cells[1].querySelector("input").value
            ) || 0;

        totalDistance += distance;

        totalEmission += factor * distance;

        totalCarEquivalent += 0.192 * distance;

        transportUsage[transport] =
            (transportUsage[transport] || 0) + distance;
    }

    const saved =
        Math.max(0,totalCarEquivalent-totalEmission);

    const treeDays =
        Math.round((saved / 21) * 365);

    const xp =
        Math.round(saved * 100);

    let ecoScore =
        Math.round(
            (saved/(totalCarEquivalent+0.001))*100
        );

    if(ecoScore > 100){
        ecoScore = 100;
    }

    let topTransport = "None";
    let maxDistance = 0;

    for(let transport in transportUsage){

        if(transportUsage[transport] > maxDistance){

            maxDistance = transportUsage[transport];
            topTransport = transport;
        }
    }

    let recommendation = "";

    if(ecoScore >= 80){

        recommendation =
        "Excellent sustainability performance. Continue prioritizing low-carbon transportation.";
    }

    else if(ecoScore >= 50){

        recommendation =
        "Good progress. Consider replacing additional car journeys with train or bus travel.";
    }

    else{

        recommendation =
        "Your transportation footprint is relatively high. Greater use of public transport, cycling, or walking can significantly reduce emissions.";
    }

    document.getElementById("results").innerHTML = `

    <div class="card">
        <h2>📊 Weekly Sustainability Report</h2>
    </div>

    <div class="card">
        <strong>Total Distance Travelled</strong>
        <div class="big">${totalDistance.toFixed(1)} km</div>
    </div>

    <div class="card">
        <strong>Total CO₂ Emitted</strong>
        <div class="big">${totalEmission.toFixed(2)} kg</div>
    </div>

    <div class="card">
        <strong>CO₂ Saved Compared to Driving</strong>
        <div class="big">${saved.toFixed(2)} kg</div>
    </div>

    <div class="card">
        <strong>Environmental Impact</strong>
        <div class="big">${treeDays} tree-days</div>
    </div>

    <div class="card">
        <strong>Eco Score</strong>
        <div class="big">${ecoScore}/100</div>
    </div>

    <div class="card">
        <strong>XP Earned</strong>
        <div class="big">${xp}</div>
    </div>

    <div class="card">
        <strong>Most Used Transport</strong>
        <div class="big">${topTransport}</div>
    </div>

    <div class="footer">
        <strong>Recommendation:</strong><br><br>
        ${recommendation}
    </div>

    `;
}

</script>

</body>
</html>
```
